name: Check PR Target Branch

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR targets main
        run: |
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "PR targets: $TARGET_BRANCH"

          # 🌇Sunset🌇 - this fork's default branch is main, not starlight-dev
          if [ "$TARGET_BRANCH" != "main" ]; then
            echo "Error: PR must target 'main' branch, but targets '$TARGET_BRANCH'"
            echo "Please change the target branch to 'main'"
            exit 1
          else
            echo "Success: PR correctly targets 'main' branch"
          fi
