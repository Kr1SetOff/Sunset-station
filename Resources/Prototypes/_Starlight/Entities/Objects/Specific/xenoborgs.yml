- type: entity
  parent: [ BorgHypo, BaseXenoborgContraband ]
  id: LicoxideHypo
  name: licoxide hypo
  description: A self-refilling injector for rapid administration of licoxide to victims.
  components:
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 12
        reagents:
        - ReagentId: Licoxide
          Quantity: 12
  - type: SolutionRegeneration
    solution: hypospray
    generated:
      reagents:
      - ReagentId: Licoxide
        Quantity: 0.2

