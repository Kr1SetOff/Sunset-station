- type: ghostTheme
  id: angel
  name: angel
  description: Watchful guardian.
  spriteSpecifier:
    sprite:
      sprite: _Starlight/Mobs/Customization/GhostThemes/angel.rsi
      state: angel
    color: "#ffffff"
  trail:
    color: "#FFFFFF"
    maxPoints: 40
    lineWidth: 2.6
    minDistance: 0.10
    decayDelay: 2.6
    decayInterval: 0.15
    shader: HolyStarsTrail
  requirements:
  # 🌇Sunset🌇 - was DiscordRolesRequirement:PatronReq (NullLink); now gated by our own sponsor tier (3+)
  - !type:SponsorTierRequirement
    minTier: 3

