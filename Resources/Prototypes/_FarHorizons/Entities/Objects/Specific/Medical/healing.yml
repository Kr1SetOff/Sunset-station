- type: entity
  name: oil pack # Starlight, capitalization
  description: Contains Oil. Pretty simple compared to other packs.
  parent: BaseHealingItem
  id: OilPack
  suffix: Full
  components:
  - type: Item
    heldPrefix: bloodpack
  - type: Tag
    tags:
    - OilPack
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/medical.rsi
    state: oilpack
# Starlight start
  - type: ConditionalHealing
    healingDefinitions:
    - allowedTags: [ IPC, Protogen, ProtoArachnid, ProtoAvali, ProtoCyclorite, ProtoDwarf, ProtoDiona, ProtoFelionoid, ProtoHuman, ProtoMoth, ProtoReptilian, ProtoResomi, ProtoSlimePerson, ProtoThaven, ProtoVox, ProtoVulp, ProtoKin, ProtoElf, ProtoLagomorph ] # Starlight
      healing:
        damageContainers:
          - IPC # Starlight
          - Hybrid # Starlight
        delay: 1.6
        modifyBloodLevel: 15
        damage:
          types:
            Bloodloss: -3
        healingBeginSound:
          path: "/Audio/Items/Medical/brutepack_begin.ogg"
          params:
            volume: 1.0
            variation: 0.125
        healingEndSound:
          path: "/Audio/Items/Medical/brutepack_end.ogg"
          params:
            volume: 1.0
            variation: 0.125
# Starlight end
  - type: Stack
    stackType: OilPack
    count: 10
  - type: StackPrice
    price: 10

- type: entity
  parent: OilPack
  id: OilPack1
  suffix: Single
  components:
  - type: Stack
    stackType: OilPack
    count: 1
