- type: entity
  id: BaseElectronics
  parent: BaseItem
  name: base electronics
  abstract: true
  suffix: Electronics
  components:
  - type: Item
    storedRotation: -90
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: generic
  - type: PhysicalComposition
    materialComposition:
      Glass: 200
    chemicalComposition:
      Silicon: 20
  - type: Circuitboard
  - type: Edible #FH - Start
    requiresSpecialDigestion: true
    delay: 3
    forceFeedDelay: 10
  - type: FlavorProfile
    flavors:
    - shocking
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: BatteryAcid
          Quantity: 15
  - type: Tag
    tags:
    - RamChip #Protogen joke, makes them able to eat them.
# FH - End
